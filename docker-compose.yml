services:

  ollama:
    image: ollama/ollama
    container_name: itsgivingcontext-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-setup:
    image: ollama/ollama
    container_name: itsgivingcontext-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    restart: "no"

  app:
    build: .
    container_name: itsgivingcontext-app
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./data:/app/data

volumes:
  ollama_models:
